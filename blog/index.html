<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/js/index.js">
    <link rel="stylesheet" href="../assets/js/navigation.js">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@300;400;500&family=Raleway:wght@200;300;400;500;700&display=swap" rel="stylesheet">
    <style>
        .blog-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            grid-column-gap: 0px;
            grid-row-gap: 0px;
        }

        .blog-side-bar {
            grid-area: 1 / 1 / 4 / 2;

        }

        .blog-body {
            grid-area: 1 / 2 / 4 / 4;
            margin: 10px;

        }

        .blog-updates {
            margin: 60px 0px 0px 0px;

        }

        .update-list li {
            margin: 20px 10px 0px 0px;
            font-size: 20px;
            font-weight: bolder;

        }
    </style>

    <title>Laura's Portfolio - Blog</title>
</head>
<!--Body Starts-->
<body>

    <header>
        <!-- NAVIGATION -->
        <section class="navigation">
            <div class="logo"><a href="../"><img src="../assets/img/logo-laura.svg" alt="Logo" class="logo-img"></a></div>
            <div class="navigation-mobile">

                <nav class="nav-menu">
                    <ul class="menu">

                        <li class="nav-page"><a href="../projects/" class="page-name" id="projects">Projects</a></li>
                        <li class="nav-page"><a href="../coming-soon/" class="page-name" id="about">Blog</a></li>
                        <li class="nav-page"><a href="../coming-soon/" class="page-name" id="skills">Skills</a></li>
                    </ul>
                    <div class="mobile-icon">
                        <span class="menu-line"></span>
                        <span class="menu-line"></span>
                        <span class="menu-line"></span>
                    </div>
                </nav>
            </div>
        </section>


    </header>



    <div class="blog-grid">

        <div class="blog-side-bar">
            <h4 class="blog-updates">Updates!</h4>
            <ul class="update-list">
                <li class="top-update">Update #1</li>
                <span>Just some text</span>
                <li class="past-updates">Update #2</li>
                <li class="past-updates">Update #3</li>
            </ul>
        </div>

        <div class="blog-body">
            <h3 class="blog-title"> February 7, 2022
            </h3>
            <h5 class="blog-sub-title">Hello World!</h5>
            <p class="blog-text">This is some text</p>
        </div>
    </div>


    <!-- ---- FOOTER ---- -->
    <footer> &copy;<script type="text/javascript">
            document.write(new Date().getFullYear());
        </script> Website Hand Coded by Laura Cornell-d'Echert
    </footer>



    <script src="../assets/js/navigation.js"> </script>

</body>
</html>
