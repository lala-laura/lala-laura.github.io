<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../assets/css/style.css">
    <!--  <link rel="stylesheet" href="../assets/js/index.js">-->
    <link rel="stylesheet" href="../assets/js/temperature.js">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@300;400;500&family=Raleway:wght@200;300;400;500;700&display=swap" rel="stylesheet">
    <title>Document</title>
    <style>
        .converter {
            display: grid;
            grid-template-columns: 200px 120px;
            margin: 20px;
            text-align: center;

        }

        .converter div {
            border: 1px solid rgb(77, 77, 155);
            font-size: 24px;
            font-weight: bolder;
        }
    </style>
</head>
<body>
    <h1>Temperature Converter</h1>

    <div class="converter">

        <div class="temp-name">Fahrenheit</div>

        <input type="number" class="temp" id="fahrenheit" name="fahrenheit" placeholder="Fahrenheit">

        <div class="temp-name">Celsius</div>
        <input type="number" class="temp" id="celsius" name="celsius" placeholder="Celsius">
        <!--     <div class="temp-name">Kelvin</div>
         <input type="number" class="temp" id="kelvin" name="kelvin">
        <div class="temp-name ">Newton</div>
        <input type="number" class="temp" id="newton" name="newton"> -->
    </div>
    <script src="../assets/js/temperature.js"></script>
</body>
</html>
